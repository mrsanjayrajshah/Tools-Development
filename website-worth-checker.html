<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Worth Checker</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f9;
    margin: 0;
}

.container {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    width: 100%;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 10px;
    color: #555;
}

input {
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    background-color: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

#loading {
    margin-top: 20px;
    color: #555;
}

#result {
    margin-top: 20px;
    padding: 10px;
    border-radius: 5px;
    background-color: #f1f1f1;
}

.hidden {
    display: none;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Website Worth Checker</h1>
        <form id="worth-form">
            <label for="website-url">Enter Website URL:</label>
            <input type="url" id="website-url" required>
            <button type="submit">Check Worth</button>
        </form>
        <div id="loading" class="hidden">Calculating...</div>
        <div id="result" class="hidden"></div>
    </div>
    <script>
        document.getElementById('worth-form').addEventListener('submit', function (event) {
    event.preventDefault();

    const websiteUrl = document.getElementById('website-url').value;
    const loadingDiv = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    // Hide result and show loading
    resultDiv.classList.add('hidden');
    loadingDiv.classList.remove('hidden');

    // Simulate an asynchronous operation
    setTimeout(function() {
        const estimatedWorth = calculateWebsiteWorth(websiteUrl);
        
        resultDiv.textContent = `The estimated worth of ${websiteUrl} is $${estimatedWorth}.`;
        resultDiv.classList.remove('hidden');
        loadingDiv.classList.add('hidden');
    }, 2000);
});

function calculateWebsiteWorth(url) {
    const domainAgeFactor = Math.random() * 10;  // Simulated value
    const backlinksFactor = Math.random() * 1000;  // Simulated value
    const dailyVisitorsFactor = Math.random() * 10000;  // Simulated value
    const seoScoreFactor = Math.random() * 100;  // Simulated value

    const worth = (domainAgeFactor + backlinksFactor + dailyVisitorsFactor + seoScoreFactor) * 0.5;
    
    return worth.toFixed(2);
}

    </script>
</body>
</html>
