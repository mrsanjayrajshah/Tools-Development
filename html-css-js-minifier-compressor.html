<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML, CSS, and JavaScript Minifier / Compressor</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff7e5f, #feb47b);
    color: #333;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    text-align: center;
    width: 90%;
    max-width: 800px;
}

.heading {
    background-color: #ff8a94;
    color: #fff;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
    resize: vertical;
}

select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    background-color: #ff8a94;
    border: none;
    color: #fff;
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s ease;
    margin: 5px;
}

button:hover {
    background-color: #ff6f7f;
}

@media (max-width: 600px) {
    .container {
        padding: 10px;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <h1 class="heading">HTML, CSS, and JavaScript Minifier / Compressor</h1>
        <form id="minifierForm">
            <div class="form-group">
                <label for="inputCode">Paste your code here:</label>
                <textarea id="inputCode" name="inputCode" placeholder="Paste your HTML, JavaScript, or CSS code here..." rows="10"></textarea>
            </div>
            <div class="form-group">
                <label for="typeSelect">Select Code Type:</label>
                <select id="typeSelect" name="typeSelect">
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="js">JavaScript</option>
                </select>
            </div>
            <button type="button" id="minifyButton">Minify</button>
            <button type="button" id="clearButton">Clear</button>
            <div class="form-group">
                <label for="outputCode">Minified Code:</label>
                <textarea id="outputCode" name="outputCode" readonly rows="10"></textarea>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    const minifyButton = document.getElementById('minifyButton');
    const clearButton = document.getElementById('clearButton');
    const inputCode = document.getElementById('inputCode');
    const outputCode = document.getElementById('outputCode');
    const typeSelect = document.getElementById('typeSelect');

    minifyButton.addEventListener('click', function() {
        const code = inputCode.value;
        const type = typeSelect.value;
        let minifiedCode = '';

        switch(type) {
            case 'html':
                minifiedCode = minifyHTML(code);
                break;
            case 'css':
                minifiedCode = minifyCSS(code);
                break;
            case 'js':
                minifiedCode = minifyJS(code);
                break;
        }

        outputCode.value = minifiedCode;
    });

    clearButton.addEventListener('click', function() {
        inputCode.value = '';
        outputCode.value = '';
    });

    function minifyHTML(html) {
        return html.replace(/\s+/g, ' ').trim();
    }

    function minifyCSS(css) {
        return css.replace(/\s+/g, ' ').replace(/;\s*}/g, '}').trim();
    }

    function minifyJS(js) {
        return js.replace(/\s+/g, ' ').replace(/;\s*}/g, '}').trim();
    }
});

    </script>
</body>
</html>
