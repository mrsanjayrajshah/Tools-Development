<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Page Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        section#results {
            margin-top: 20px;
        }

        textarea {
            height: 200px;
            resize: none;
        }

        .actions {
            margin-top: 10px;
        }
        
        .actions button {
            background-color: #28a745;
            margin-right: 10px;
        }

        .actions button:hover {
            background-color: #218838;
        }

        .actions button.copy {
            background-color: #dc3545;
        }

        .actions button.copy:hover {
            background-color: #c82333;
        }

        .notification {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #28a745;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-size: 14px;
        }

        .privacy-preview {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Privacy Policy Page Generator</h1>
        </header>
        
        <main>
            <form id="privacy-form">
                <div class="input-group">
                    <label for="website-url">Website URL:</label>
                    <input type="text" id="website-url" name="website-url" placeholder="Enter website URL">
                </div>
                <div class="input-group">
                    <label for="website-name">Website Name:</label>
                    <input type="text" id="website-name" name="website-name" placeholder="Enter website name">
                </div>
                <div class="input-group">
                    <label for="contact-email">Contact Email:</label>
                    <input type="email" id="contact-email" name="contact-email" placeholder="Enter contact email">
                </div>
                <button type="button" id="generate-button">Generate Privacy Policy</button>
            </form>
            
            <section id="results">
                <h2>Your Privacy Policy:</h2>
                <textarea id="privacy-policy" readonly></textarea>
                <div class="actions">
                    <button type="button" id="preview-button">Preview</button>
                    <button type="button" class="copy" id="copy-button">Copy to Clipboard</button>
                </div>
                <div id="notification" class="notification">Copied!</div>
            </section>

            <!-- Privacy Policy Preview Section -->
            <section id="privacy-preview" class="privacy-preview"></section>
        </main>
        
        <footer>
            <p>&copy; 2024 Privacy Policy Generator</p>
        </footer>
    </div>

    <script>
        document.getElementById('generate-button').addEventListener('click', function() {
            const websiteURL = document.getElementById('website-url').value;
            const websiteName = document.getElementById('website-name').value;
            const contactEmail = document.getElementById('contact-email').value;

            // Validate input fields
            if (!websiteURL || !websiteName || !contactEmail) {
                alert('Please fill in all fields.');
                return;
            }

            // Generate Privacy Policy text
            const privacyPolicy = `
            <h1>Privacy Policy for "${websiteName}"</h1>
            <p>At "${websiteName}", accessible from ${websiteURL}, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by ${websiteName} and how we use it.</p>
            <p>If you have additional questions or require more information about our Privacy Policy, do not hesitate to contact us at ${contactEmail}.</p>
            <h2>Consent</h2>
            <p>By using our website, you hereby consent to our Privacy Policy and agree to its terms.</p>
            <h2>Information we collect</h2>
            <p>The personal information that you are asked to provide, and the reasons why you are asked to provide it, will be made clear to you at the point we ask you to provide your personal information.</p>
            <h2>How we use your information</h2>
            <ul>
                <li>Provide, operate, and maintain our website.</li>
                <li>Improve, personalize, and expand our website.</li>
                <li>Understand and analyze how you use our website.</li>
                <li>Develop new products, services, features, and functionality.</li>
                <li>Communicate with you, either directly or through one of our partners, including for customer service, to provide you with updates and other information relating to the website, and for marketing and promotional purposes.</li>
                <li>Send you emails.</li>
                <li>Find and prevent fraud.</li>
            </ul>
            <h2>Log Files</h2>
            <p>${websiteName} follows a standard procedure of using log files. These files log visitors when they visit websites. All hosting companies do this and a part of hosting services' analytics. The information collected by log files include internet protocol (IP) addresses, browser type, Internet Service Provider (ISP), date and time stamp, referring/exit pages, and possibly the number of clicks. These are not linked to any information that is personally identifiable. The purpose of the information is for analyzing trends, administering the site, tracking users' movement on the website, and gathering demographic information.</p>
            <h2>Cookies and Web Beacons</h2>
            <p>Like any other website, ${websiteName} uses 'cookies'. These cookies are used to store information including visitors' preferences, and the pages on the website that the visitor accessed or visited. The information is used to optimize the users' experience by customizing our web page content based on visitors' browser type and/or other information.</p>
            <h2>Advertising Partners Privacy Policies</h2>
            <p>You may consult this list to find the Privacy Policy for each of the advertising partners of ${websiteName}.</p>
            <p>Third-party ad servers or ad networks uses technologies like cookies, JavaScript, or Web Beacons that are used in their respective advertisements and links that appear on ${websiteName}, which are sent directly to users' browser. They automatically receive your IP address when this occurs. These technologies are used to measure the effectiveness of their advertising campaigns and/or to personalize the advertising content that you see on websites that you visit.</p>
            <p>Note that ${websiteName} has no access to or control over these cookies that are used by third-party advertisers.</p>
            <h2>Third Party Privacy Policies</h2>
            <p>${websiteName}'s Privacy Policy does not apply to other advertisers or websites. Thus, we are advising you to consult the respective Privacy Policies of these third-party ad servers for more detailed information. It may include their practices and instructions about how to opt-out of certain options.</p>
            <h2>Children's Information</h2>
            <p>Another part of our priority is adding protection for children while using the internet. We encourage parents and guardians to observe, participate in, and/or monitor and guide their online activity.</p>
            <p>${websiteName} does not knowingly collect any Personal Identifiable Information from children under the age of 13. If you think that your child provided this kind of information on our website, we strongly encourage you to contact us immediately and we will do our best efforts to promptly remove such information from our records.</p> <p> Our privacy policy is generated by <a href="https://hamrogadgetbazar.com" target="_blanks"> Hamrogadgetbazar </a></p>
            <h2>Online Privacy Policy Only</h2>
            <p>This Privacy Policy applies only to our online activities and is valid for visitors to our website with regards to the information that they shared and/or collect in ${websiteName}. This policy is not applicable to any information collected offline or via channels other than this website.</p>
            <h2>Consent</h2>
            <p>By using our website, you hereby consent to our Privacy Policy and agree to its terms.</p>
            <h2>Update</h2>
            <p>This Privacy Policy was last updated on ${new Date().toLocaleDateString()}.</p>
            <p>Should we update, amend or make any changes to our Privacy Policy, those changes will be posted here.</p>
            `;

            // Display Privacy Policy
            document.getElementById('privacy-policy').innerHTML = privacyPolicy;
        });

        document.getElementById('preview-button').addEventListener('click', function() {
            const privacyPolicyHTML = document.getElementById('privacy-policy').innerHTML;
            const previewSection = document.getElementById('privacy-preview');
            if (privacyPolicyHTML) {
                previewSection.innerHTML = privacyPolicyHTML;
                previewSection.style.display = 'block';
            } else {
                alert('Generate the privacy policy first.');
            }
        });

        document.getElementById('copy-button').addEventListener('click', function() {
            const privacyPolicyText = document.getElementById('privacy-policy').textContent;
            if (privacyPolicyText) {
                navigator.clipboard.writeText(privacyPolicyText).then(function() {
                    // Show notification
                    const notification = document.getElementById('notification');
                    notification.style.display = 'block';
                    setTimeout(() => {
                        notification.style.display = 'none';
                    }, 2000); // Hide notification after 2 seconds
                }, function() {
                    alert('Failed to copy Privacy Policy.');
                });
            } else {
                alert('Generate the privacy policy first.');
            }
        });
    </script>
</body>
</html>
