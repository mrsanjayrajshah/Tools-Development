    <script>
      function convertToNepali(formId) {
        $.ajax({
          type: "post",
          async: true,
          global: false,
          url: "convertToNep",
          data: $("#" + formId).serialize(),
          success: function (data) {
            $("#resultDateDiv").html(data);
          },
        });
      }

      function convertToEnglish(formId) {
        $.ajax({
          type: "post",
          async: true,
          global: false,
          url: "convertToEng",
          data: $("#" + formId).serialize(),
          success: function (data) {
            $("#resultDateDiv").html(data);
          },
        });
      }

      function getNepaliDateByLabel(elementObj) {
        var x = elementObj.innerHTML;

        if (x.length > 4) {
          var dateChunks = x.split("-");
          var monthStr = dateChunks[0];
          var dateStr = dateChunks[1];
          var yearStr = dateChunks[2];

          if (yearStr.length == 2) {
            yearStr = "20" + yearStr;
          }

          $.ajax({
            type: "post",
            async: true,
            global: false,
            url: "nepToEngDate",
            data: "year=" + yearStr + "&month=" + monthStr + "&date=" + dateStr,
            success: function (data) {
              elementObj.setAttribute(
                "title",
                "Converted Nepali Date :: " + data
              );
            },
          });
        }
      }

      function getNepaliDateByTD(elementObj) {
        var x = elementObj.innerHTML;

        if (x.length > 4) {
          var dateChunks = x.split("-");
          var dateStr = dateChunks[0];
          var monthStr = dateChunks[1];
          var yearStr = dateChunks[2];

          if (yearStr.length == 2) {

            type: "post",
            async: true,
            global: false,
            url: "nepToEngDate",
            data: "year=" + yearStr + "&month=" + monthStr + "&date=" + dateStr,

            },

        }
      }
      function getNepaliDate(elementObj, eleLabel) {
        var x = elementObj.value;

        if (x.length > 4) {
          var dateChunks = "";
          var dateStr = "";
          var monthStr = "";
          var yearStr = "";
          if (x.indexOf("/") > 0) {
            dateChunks = x.split("/");
            dateStr = dateChunks[0];
            monthStr = dateChunks[1];
            yearStr = dateChunks[2];
          } else {
            dateChunks = x.split("-");
            dateStr = dateChunks[0];
            monthStr = dateChunks[1];
            yearStr = dateChunks[2];
          }

          $.ajax({
            type: "post",
            async: true,
            global: false,
            url: "nepToEngDate",
            data: "year=" + yearStr + "&month=" + monthStr + "&date=" + dateStr,
            success: function (data) {
              elementObj.setAttribute(
                "title",
                "Converted Nepali Date :: " + data
              );
            },
          });
        }
      }
      function getNepaliConvertedDate(elementObj, eleLabel) {
        var x = elementObj.value;

        if (x.length > 4) {
          var dateChunks = x.split("-");
          var dateStr = dateChunks[0];
          var monthStr = dateChunks[1];
          var yearStr = dateChunks[2];

          $.ajax({
            type: "post",
            async: true,
            global: false,
            url: "nepToEngDate",
            data: "year=" + yearStr + "&month=" + monthStr + "&date=" + dateStr,
            success: function (data) {
              elementObj.setAttribute(
                "title",
                "Converted Nepali Date :: " + data
              );
            },
          });
        }
      }
      function getNepaliDateTime(elementObj, eleLabel) {
        var dateTime = elementObj.value;
        var dateTimeChunks = dateTime.split(" ");
        if (dateTimeChunks.length > 1) {
          var dateStr = dateTimeChunks[0];
          var timeStr = dateTimeChunks[1];
          if (dateStr.length > 4) {
            var dateChunks = dateStr.split("-");
            var dateStr = dateChunks[0];
            var monthStr = dateChunks[1];
            var yearStr = dateChunks[2];

            $.ajax({
              type: "post",
              async: true,
              global: false,
              url: "nepToEngDate",
              data:
                "year=" + yearStr + "&month=" + monthStr + "&date=" + dateStr,
              success: function (data) {
                elementObj.setAttribute(
                  "title",
                  "Converted Nepali Date :: " + data + " " + timeStr
                );
              },
            });
          } else {
            elementObj.setAttribute("title", "");
          }
        } else {
          elementObj.setAttribute("title", "");
        }
      }
