<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Age Checker</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    margin: 0;
}

.container {
    text-align: center;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
}

h1 {
    margin-bottom: 20px;
    font-size: 24px;
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 4px;
    margin-bottom: 10px;
    width: 100%;
    max-width: 300px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    background: #2575fc;
    color: white;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: #6a11cb;
}

.result {
    font-size: 18px;
    font-weight: bold;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Domain Age Checker</h1>
        <form id="domainForm">
            <input type="text" id="domainInput" placeholder="Enter domain name">
            <input type="date" id="creationDateInput" placeholder="Enter creation date">
            <button type="submit">Check Age</button>
        </form>
        <div id="result" class="result"></div>
    </div>
    <script>
        document.getElementById('domainForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const domain = document.getElementById('domainInput').value.trim();
    const creationDate = document.getElementById('creationDateInput').value;
    
    if (domain && creationDate) {
        const result = calculateDomainAge(domain, creationDate);
        document.getElementById('result').innerText = result;
    } else {
        document.getElementById('result').innerText = 'Please enter a valid domain name and creation date.';
    }
});

function calculateDomainAge(domain, creationDateStr) {
    const creationDate = new Date(creationDateStr);
    const currentDate = new Date();
    let ageInYears = currentDate.getFullYear() - creationDate.getFullYear();
    
    if (currentDate.getMonth() < creationDate.getMonth() || 
        (currentDate.getMonth() === creationDate.getMonth() && currentDate.getDate() < creationDate.getDate())) {
        ageInYears--;
    }
    
    return `The domain ${domain} is approximately ${ageInYears} years old.`;
}

    </script>
</body>
</html>
