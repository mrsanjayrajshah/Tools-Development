<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <style>
      /* Resetting some default styles */
body, h5, label, input, select, button {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Body styles */
body {
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 20px;
}

/* Card styles */
.card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    overflow: hidden;
    max-width: 500px;
    width: 100%;
}

.card-header {
    background: #17a2b8;
    color: #fff;
    padding: 15px;
    text-align: center;
}

.card-body {
    padding: 20px;
}

/* Form group styles */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.form-control {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

/* Button styles */
.btn {
    display: inline-block;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    color: #fff;
    background: #28a745;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn:hover {
    background: #218838;
}

/* Responsive design */
@media (max-width: 768px) {
    .card {
        max-width: 100%;
    }

    .card-header {
        font-size: 18px;
    }

    .btn {
        font-size: 14px;
    }
}

    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h5>All HD Format YouTube Free Video Downloader</h5>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label><b>Enter YouTube Video Link:</b></label>
                <input class="form-control link" name="link" type="text" required />
            </div>
            <form class="form-download">
                <div class="form-group">
                    <label><b>Select Video Format:</b></label>
                    <select class="form-control formte" required>
                        <option disabled selected>Select Video Format</option>
                        <option value="mp3">Mp3</option>
                        <option value="144">144 Mp4</option>
                        <option value="360">360 Mp4</option>
                        <option value="480">480 Mp4</option>
                        <option value="720">720 Mp4</option>
                        <option value="1080">1080 Mp4</option>
                        <option value="4k">4k Mp4</option>
                        <option value="8k">8k Mp4</option>
                    </select>
                </div>
                <div class="form-group">
                    <button class="btn btn-success" type="submit">Download Click Here</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
