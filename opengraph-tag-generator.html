<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGraph Tag Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    color: #333;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: #fff;
    padding: 20px 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    text-align: center;
    width: 90%;
    max-width: 600px;
}

.heading {
    background-color: #ff0000;
    color: #fff;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-group {
    text-align: left;
}

label {
    font-weight: 500;
    margin-bottom: 5px;
    display: block;
}

input[type="text"], select, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

input[type="text"]:focus, select:focus, textarea:focus {
    border-color: #6a11cb;
    box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
}

.button-group {
    display: flex;
    justify-content: space-between;
}

button {
    background-color: #6a11cb;
    border: none;
    color: #fff;
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s ease;
    width: 48%;
}

button:hover {
    background-color: #2575fc;
}

textarea {
    height: 120px;
    resize: none;
    margin-top: 20px;
    border-radius: 5px;
}

    </style>
</head>
<body>
    <div class="container">
        <h1 class="heading">OpenGraph Tag Generator</h1>
        <form id="ogForm">
            <div class="form-group">
                <label for="ogTitle">Title:</label>
                <input type="text" id="ogTitle" name="ogTitle">
            </div>

            <div class="form-group">
                <label for="ogType">Type:</label>
                <input type="text" id="ogType" name="ogType">
            </div>

            <div class="form-group">
                <label for="ogImage">Image URL:</label>
                <input type="text" id="ogImage" name="ogImage">
            </div>

            <div class="form-group">
                <label for="ogUrl">URL:</label>
                <input type="text" id="ogUrl" name="ogUrl">
            </div>

            <div class="form-group">
                <label for="ogDescription">Description:</label>
                <input type="text" id="ogDescription" name="ogDescription">
            </div>

            <div class="form-group">
                <label for="ogSiteName">Site Name:</label>
                <input type="text" id="ogSiteName" name="ogSiteName">
            </div>

            <div class="button-group">
                <button type="button" onclick="generateOgTags()">Generate</button>
                <button type="reset">Reset</button>
            </div>
        </form>
        <textarea id="output" readonly></textarea>
    </div>
    <script>
        function generateOgTags() {
    const ogTitle = document.getElementById('ogTitle').value;
    const ogType = document.getElementById('ogType').value;
    const ogImage = document.getElementById('ogImage').value;
    const ogUrl = document.getElementById('ogUrl').value;
    const ogDescription = document.getElementById('ogDescription').value;
    const ogSiteName = document.getElementById('ogSiteName').value;

    let ogTags = '';

    if (ogTitle) {
        ogTags += `<meta property="og:title" content="${ogTitle}">\n`;
    }
    if (ogType) {
        ogTags += `<meta property="og:type" content="${ogType}">\n`;
    }
    if (ogImage) {
        ogTags += `<meta property="og:image" content="${ogImage}">\n`;
    }
    if (ogUrl) {
        ogTags += `<meta property="og:url" content="${ogUrl}">\n`;
    }
    if (ogDescription) {
        ogTags += `<meta property="og:description" content="${ogDescription}">\n`;
    }
    if (ogSiteName) {
        ogTags += `<meta property="og:site_name" content="${ogSiteName}">\n`;
    }

    document.getElementById('output').value = ogTags;
}

    </script>
</body>
</html>
