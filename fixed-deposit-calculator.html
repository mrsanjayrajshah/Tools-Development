<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit Calculator</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    width: 100%;
}

h1 {
    text-align: center;
    color: #333;
}

.calculator label {
    display: block;
    margin-top: 10px;
    color: #555;
}

.calculator input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    background-color: #28a745;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #218838;
}

.results {
    margin-top: 20px;
    text-align: center;
}

.results p {
    margin: 5px 0;
    color: #333;
}

@media (max-width: 600px) {
    .container {
        padding: 15px;
    }

    button {
        padding: 8px;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Fixed Deposit Calculator</h1>
        <div class="calculator">
            <label for="principal">Principal Amount (Rs):</label>
            <input type="number" id="principal" placeholder="Enter principal amount">

            <label for="rate">Interest Rate (%):</label>
            <input type="number" id="rate" placeholder="Enter interest rate">

            <label for="time">Tenure (Years):</label>
            <input type="number" id="time" placeholder="Enter tenure in years">

            <button onclick="calculateFD()">Calculate</button>

            <div class="results">
                <p>Total Amount: Rs. <span id="totalAmount"></span></p>
                <p>Interest Amount: Rs. <span id="interestAmount"></span></p>
            </div>
        </div>
    </div>
    <script>
        function calculateFD() {
    const principal = parseFloat(document.getElementById('principal').value);
    const rate = parseFloat(document.getElementById('rate').value);
    const time = parseFloat(document.getElementById('time').value);

    if (isNaN(principal) || isNaN(rate) || isNaN(time)) {
        alert('Please enter valid numbers');
        return;
    }

    const interest = principal * (rate / 100) * time;
    const totalAmount = principal + interest;

    document.getElementById('totalAmount').innerText = totalAmount.toFixed(2);
    document.getElementById('interestAmount').innerText = interest.toFixed(2);
}

    </script>
</body>
</html>
