<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator Nepal 2024</title>
    <style>
        /* General Styles */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    max-width: 600px;
    width: 100%;
}

/* Form Styles */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

button {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 4px;
    cursor: pointer;
    margin: 5px;
    font-size: 16px;
}

button:hover {
    background-color: #218838;
}

#resetBtn {
    background-color: #dc3545;
}

#resetBtn:hover {
    background-color: #c82333;
}

/* Responsive Styles */
@media (max-width: 768px) {
    .form-group {
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 12px;
        font-size: 18px;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Income Tax Calculator Nepal 2024</h1>
        <div class="form-group">
            <label for="employeeStatus">Employee Status</label>
            <select id="employeeStatus">
                <option value="single">Single</option>
                <option value="married">Married</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fiscalYear">Fiscal Year</label>
            <select id="fiscalYear">
                <option value="2080/2081">2080/2081</option>
                <!-- Add other fiscal years if needed -->
            </select>
        </div>
        <div class="form-group">
            <h2>Income Details</h2>
            <label for="monthlySalary">Monthly Salary</label>
            <input type="number" id="monthlySalary" placeholder="Enter monthly salary">
            <label for="numberOfMonths">Number of Months</label>
            <input type="number" id="numberOfMonths" value="12">
            <label for="bonus">Bonus</label>
            <input type="number" id="bonus" placeholder="Enter bonus">
            <label for="totalIncome">Total Income</label>
            <input type="number" id="totalIncome" readonly>
        </div>
        <div class="form-group">
            <h2>Deductions</h2>
            <label for="ssf">Social Security Fund</label>
            <input type="number" id="ssf" placeholder="Enter SSF amount">
            <label for="epf">Employees Provident Fund</label>
            <input type="number" id="epf" placeholder="Enter EPF amount">
            <label for="cit">Citizen Investment Trust</label>
            <input type="number" id="cit" placeholder="Enter CIT amount">
            <label for="insurance">Insurance</label>
            <input type="number" id="insurance" placeholder="Enter Insurance amount">
        </div>
        <div class="form-group">
            <button id="calculateBtn">Calculate</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div id="result">
            <!-- Calculation results will be displayed here -->
        </div>
    </div>
    <script>
        document.getElementById('calculateBtn').addEventListener('click', calculateTax);
document.getElementById('resetBtn').addEventListener('click', resetValues);

function calculateTax() {
    const monthlySalary = parseFloat(document.getElementById('monthlySalary').value) || 0;
    const numberOfMonths = parseFloat(document.getElementById('numberOfMonths').value) || 12;
    const bonus = parseFloat(document.getElementById('bonus').value) || 0;
    
    const totalIncome = (monthlySalary * numberOfMonths) + bonus;
    document.getElementById('totalIncome').value = totalIncome;

    const ssf = parseFloat(document.getElementById('ssf').value) || 0;
    const epf = parseFloat(document.getElementById('epf').value) || 0;
    const cit = parseFloat(document.getElementById('cit').value) || 0;
    const insurance = parseFloat(document.getElementById('insurance').value) || 0;

    // Simple tax calculation logic for demonstration
    let taxableIncome = totalIncome - (ssf + epf + cit + insurance);
    let tax = 0;

    // Example tax brackets (adjust according to the latest tax regulations)
    if (taxableIncome <= 400000) {
        tax = 0;
    } else if (taxableIncome <= 800000) {
        tax = (taxableIncome - 400000) * 0.10;
    } else {
        tax = (taxableIncome - 800000) * 0.20 + 40000;
    }

    document.getElementById('result').innerHTML = `<h2>Estimated Tax</h2><p>Your estimated tax liability is: NPR ${tax.toFixed(2)}</p>`;
}

function resetValues() {
    document.getElementById('monthlySalary').value = '';
    document.getElementById('numberOfMonths').value = '12';
    document.getElementById('bonus').value = '';
    document.getElementById('totalIncome').value = '';
    document.getElementById('ssf').value = '';
    document.getElementById('epf').value = '';
    document.getElementById('cit').value = '';
    document.getElementById('insurance').value = '';
    document.getElementById('result').innerHTML = '';
}

    </script>
</body>
</html>
