    const bsToAd = (bsYear, bsMonth, bsDay) => {
    const baseDateAD = new Date(1918, 3, 13); // Base date: April 13, 1918 (in AD)
    const baseDateBS = { year: 1975, month: 1, day: 1 }; // Base date: 1st Baishakh, 1975 (in BS)
    const daysInBSMonths = [
        30, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30, 30, 30
    ];

    let totalDays = 0;

    // Calculate days from base BS date to the given BS date
    for (let y = baseDateBS.year; y < bsYear; y++) {
        totalDays += daysInBSMonths.reduce((a, b) => a + b, 0);
    }
    for (let m = 0; m < bsMonth - 1; m++) {
        totalDays += daysInBSMonths[m];
    }
    totalDays += bsDay - baseDateBS.day;

    // Add the days to the base AD date
    baseDateAD.setDate(baseDateAD.getDate() + totalDays);

    return {
        year: baseDateAD.getFullYear(),
        month: baseDateAD.getMonth() + 1,
        day: baseDateAD.getDate()
    };
};


const adToBs = (adYear, adMonth, adDay) => {
    const baseDateAD = new Date(1918, 3, 13); // Base date: April 13, 1918 (in AD)
    const baseDateBS = { year: 1975, month: 1, day: 1 }; // Base date: 1st Baishakh, 1975 (in BS)
    const daysInBSMonths = [
        30, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30, 30, 30
    ];

    const givenDateAD = new Date(adYear, adMonth - 1, adDay);
    const timeDiff = givenDateAD.getTime() - baseDateAD.getTime();
    const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));

    let bsYear = baseDateBS.year;
    let bsMonth = baseDateBS.month;
    let bsDay = baseDateBS.day;

    let daysRemaining = totalDays;

    while (daysRemaining > 0) {
        if (daysRemaining > daysInBSMonths[bsMonth - 1]) {
            daysRemaining -= daysInBSMonths[bsMonth - 1];
            bsMonth++;
            if (bsMonth > 12) {
                bsMonth = 1;
                bsYear++;
            }
        } else {
            bsDay += daysRemaining;
            daysRemaining = 0;
        }
    }

    return {
        year: bsYear,
        month: bsMonth,
        day: bsDay
    };
};
